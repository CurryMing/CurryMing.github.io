<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSGO 战绩列表</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="assets/css/report-list.css" />
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1>CSGO 战绩列表</h1>
            <p class="sub">展示所有历史对局，点击后进入对应日期的日报页。</p>
        </div>
        <div class="actions">
            <button id="trendBtn" class="btn" type="button">Rating 走势</button>
            <button id="backBtn" class="btn" type="button">返回高光页</button>
        </div>
    </div>

    <div id="list" class="list"></div>
    <div id="empty" class="empty" hidden>暂无战绩数据。</div>
</div>

<button id="scrollTopBtn" class="scroll-top" type="button" aria-label="回到顶部">↑</button>
<script src="assets/js/report-list.js"></script>
</body>
</html>
