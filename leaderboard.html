<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSGO 排行榜</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <style>
        :root{
            --bg:#0f1115; --card:#171b22; --text:#f5f7fa; --muted:#9aa4b2;
            --border:#2a303b; --accent2:#00d4ff; --input-bg:#12161d;
            --gold:#ffd700; --silver:#c0c0c0; --bronze:#cd7f32;
        }
        :root[data-theme="light"]{
            --bg:#f3f6fb; --card:#ffffff; --text:#1b2430; --muted:#5f6f83;
            --border:#d5dfec; --accent2:#1e8dff; --input-bg:#f7f9fd;
            --gold:#b8960f; --silver:#8a8a8a; --bronze:#8b5e3c;
        }
        *{box-sizing:border-box}
        body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,Microsoft YaHei,sans-serif}
        .wrap{width:min(980px,92%);margin:0 auto;padding:24px 0 34px}
        .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
        h1{margin:0;font-size:30px}
        .sub{margin:8px 0 0;color:var(--muted);font-size:14px}
        .btn{
            height:38px;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);
            color:var(--text);padding:0 12px;cursor:pointer
        }
        .btn:hover{border-color:var(--accent2)}
        .actions{display:flex;gap:8px;flex-wrap:wrap}
        .table-wrap{margin-top:16px;border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:auto}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th,td{padding:12px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
        th{font-size:12px;color:var(--muted);letter-spacing:.3px;cursor:pointer;user-select:none;position:relative}
        th:hover{color:var(--text)}
        th .sort-arrow{display:inline-block;margin-left:4px;opacity:.35;font-size:10px}
        th.sorted .sort-arrow{opacity:1;color:var(--accent2)}
        tr:last-child td{border-bottom:none}
        .rank-cell{font-weight:700;text-align:center;width:40px}
        .rank-1{color:var(--gold)}
        .rank-2{color:var(--silver)}
        .rank-3{color:var(--bronze)}
        .player-name{font-weight:600}
        .stat-highlight{color:var(--accent2);font-weight:700}
        .empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:14px}
        .tabs{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
        .tab{
            padding:6px 16px;border:1px solid var(--border);border-radius:999px;background:transparent;
            color:var(--muted);font-size:13px;cursor:pointer
        }
        .tab:hover{border-color:var(--accent2);color:var(--text)}
        .tab.active{background:rgba(0,212,255,.12);border-color:var(--accent2);color:var(--accent2)}
        .weekly-wrap{margin-top:24px}
        .weekly-wrap h2{font-size:18px;margin:0 0 10px;color:var(--text)}
        .weekly-block{border:1px solid var(--border);border-radius:12px;background:var(--card);margin-bottom:10px;overflow:hidden}
        .weekly-head{padding:10px 12px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
        .weekly-head .mvp-badge{font-size:12px;font-weight:600;color:var(--gold)}
        .weekly-table{width:100%;border-collapse:collapse;font-size:13px}
        .weekly-table th,.weekly-table td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
        .weekly-table th{font-size:11px;color:var(--muted);letter-spacing:.2px}
        .weekly-table tr:last-child td{border-bottom:none}
        .weekly-table .mvp-row{background:rgba(255,215,0,.08)}
        .weekly-table .mvp-row td{font-weight:600}
        .weekly-mvp-name{color:var(--gold);font-weight:700}
        .weekly-table .rating-cell{color:var(--accent2);font-weight:600}
        .scroll-top{
            position:fixed;bottom:30px;right:30px;z-index:999;
            width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
            background:var(--card);color:var(--text);font-size:20px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;
            box-shadow:0 4px 14px rgba(0,0,0,.18)
        }
        .scroll-top.show{opacity:1;visibility:visible}
        .scroll-top:hover{border-color:var(--accent2)}
    </style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1>🏆 CSGO 排行榜</h1>
            <p class="sub">全赛季荣誉统计：MVP 次数、5杀、4杀、总击杀。</p>
        </div>
        <div class="actions">
            <button id="backBtn" class="btn" type="button">返回高光页</button>
        </div>
    </div>

    <div class="tabs" id="tabs">
        <button class="tab active" data-sort="mvp">MVP 次数</button>
        <button class="tab" data-sort="k5">5杀</button>
        <button class="tab" data-sort="k4">4杀</button>
        <button class="tab" data-sort="kills">总击杀</button>
    </div>

    <div id="tableWrap" class="table-wrap"></div>
    <div id="weeklyWrap"></div>
</div>

<button id="scrollTopBtn" class="scroll-top" type="button" aria-label="回到顶部">↑</button>

<script>
    const LS_THEME = "csgo-theme";
    const REPORT_JSON_URL = "assets/reports/daily-report.json";
    let currentSort = "mvp";
    let sortDesc = true;

    function applyTheme(theme){
        const nextTheme = theme === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", nextTheme);
        localStorage.setItem(LS_THEME, nextTheme);
    }

    function initTheme(){
        const savedTheme = localStorage.getItem(LS_THEME);
        if (savedTheme === "light" || savedTheme === "dark") {
            applyTheme(savedTheme);
            return;
        }
        const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
        applyTheme(prefersLight ? "light" : "dark");
    }

    function getWeekNumber(dateStr){
        const d = new Date(dateStr + "T00:00:00");
        const dayNum = (d.getDay() + 6) % 7;
        d.setDate(d.getDate() - dayNum + 3);
        const jan4 = new Date(d.getFullYear(), 0, 4);
        return 1 + Math.round((d - jan4) / 86400000 / 7);
    }

    function toLocalDateStr(d){
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
    }

    function getWeekMonday(dateStr){
        const d = new Date(dateStr + "T00:00:00");
        const day = d.getDay();
        const diff = day === 0 ? -6 : 1 - day;
        const monday = new Date(d);
        monday.setDate(d.getDate() + diff);
        return toLocalDateStr(monday);
    }

    function getWeekSunday(dateStr){
        const d = new Date(dateStr + "T00:00:00");
        const day = d.getDay();
        const diff = day === 0 ? 0 : 7 - day;
        const sunday = new Date(d);
        sunday.setDate(d.getDate() + diff);
        return toLocalDateStr(sunday);
    }

    function computeRankings(raw){
        const list = Array.isArray(raw && raw.reports) ? raw.reports : [];
        const allMatches = list
            .filter(item => /^\d{4}-\d{2}-\d{2}$/.test(item.date))
            .flatMap(item => (item.matches || []).map(m => ({ ...m, date: item.date })));

        const playerAgg = new Map();
        const weekGroups = new Map();

        allMatches.forEach(m => {
            const wk = `${getWeekNumber(m.date)}-${new Date(m.date).getFullYear()}`;
            if (!weekGroups.has(wk)) weekGroups.set(wk, []);
            weekGroups.get(wk).push(m);

            (m.players || []).forEach(p => {
                const name = p.name || "未知";
                if (!playerAgg.has(name)) {
                    playerAgg.set(name, { name, kills:0, k4:0, k5:0 });
                }
                const s = playerAgg.get(name);
                s.kills += Number(p.k) || 0;
                s.k4 += Number(p.k4) || 0;
                s.k5 += Number(p.k5) || 0;
            });
        });

        const mvpCounts = new Map();
        const weeklyDetails = [];

        for (const [weekKey, weekMatches] of weekGroups) {
            const stats = new Map();
            weekMatches.forEach(m => {
                (m.players || []).forEach(p => {
                    const name = p.name || "未知";
                    if (!stats.has(name)) stats.set(name, { k:0, d:0, a:0, ratingSum:0, count:0 });
                    const s = stats.get(name);
                    s.k += Number(p.k) || 0;
                    s.d += Number(p.d) || 0;
                    s.a += Number(p.a) || 0;
                    s.ratingSum += Number(p.rating) || 0;
                    s.count++;
                });
            });

            let bestName = null, bestAvg = -1;
            const playerEntries = [];
            for (const [name, s] of stats) {
                const avg = s.ratingSum / s.count;
                playerEntries.push({
                    name,
                    avgRating: avg,
                    avgK: (s.k / s.count).toFixed(1),
                    avgD: (s.d / s.count).toFixed(1),
                    avgA: (s.a / s.count).toFixed(1),
                    matches: s.count
                });
                if (avg > bestAvg) { bestAvg = avg; bestName = name; }
            }
            if (bestName) {
                mvpCounts.set(bestName, (mvpCounts.get(bestName) || 0) + 1);
                const sampleDate = weekMatches[0].date;
                const monday = getWeekMonday(sampleDate);
                const sunday = getWeekSunday(sampleDate);
                const weekNum = weekKey.split("-")[0];
                weeklyDetails.push({
                    weekKey,
                    weekNumber: weekNum,
                    dateRange: `${monday.slice(5).replace("-","/")} - ${sunday.slice(5).replace("-","/")}`,
                    mvpName: bestName,
                    mvpAvgRating: bestAvg.toFixed(2),
                    players: playerEntries.sort((a, b) => b.avgRating - a.avgRating)
                });
            }
        }

        weeklyDetails.sort((a, b) => b.weekKey.localeCompare(a.weekKey));

        const rankings = [];
        for (const [name, agg] of playerAgg) {
            rankings.push({
                name,
                mvp: mvpCounts.get(name) || 0,
                k5: agg.k5,
                k4: agg.k4,
                kills: agg.kills
            });
        }
        return { rankings, weeklyDetails };
    }

    function sortRankings(rankings, field, desc){
        const sorted = [...rankings].sort((a, b) => {
            if (desc) return b[field] - a[field];
            return a[field] - b[field];
        });
        return sorted;
    }

    function getRankClass(index){
        if (index === 0) return "rank-1";
        if (index === 1) return "rank-2";
        if (index === 2) return "rank-3";
        return "";
    }

    function getRankDisplay(index){
        if (index === 0) return "🥇";
        if (index === 1) return "🥈";
        if (index === 2) return "🥉";
        return String(index + 1);
    }

    function setSort(field){
        if (currentSort === field) {
            sortDesc = !sortDesc;
        } else {
            currentSort = field;
            sortDesc = true;
        }
        document.querySelectorAll(".tab").forEach(t => {
            t.classList.toggle("active", t.dataset.sort === field);
        });
        renderTable();
    }

    function renderTable(){
        const elWrap = document.getElementById("tableWrap");
        const result = computeRankings(window._rawData || []);
        const rankings = result.rankings;
        if (!rankings.length) {
            elWrap.innerHTML = '<div class="empty">暂无战绩数据。</div>';
            renderWeeklyData(null);
            return;
        }

        const sorted = sortRankings(rankings, currentSort, sortDesc);

        const maxMvp = Math.max(...rankings.map(p => p.mvp), 0);
        const maxK5 = Math.max(...rankings.map(p => p.k5), 0);
        const maxK4 = Math.max(...rankings.map(p => p.k4), 0);
        const maxKills = Math.max(...rankings.map(p => p.kills), 0);

        function thHtml(label, field){
            const active = currentSort === field;
            return `<th class="${active ? "sorted" : ""}">${label}${active ? `<span class="sort-arrow">${sortDesc ? "▼" : "▲"}</span>` : ""}</th>`;
        }

        elWrap.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th class="rank-cell">#</th>
                        <th>玩家</th>
                        ${thHtml("MVP", "mvp")}
                        ${thHtml("5杀", "k5")}
                        ${thHtml("4杀", "k4")}
                        ${thHtml("总击杀", "kills")}
                    </tr>
                </thead>
                <tbody>
                    ${sorted.map((p, i) => `
                        <tr>
                            <td class="rank-cell ${getRankClass(i)}">${getRankDisplay(i)}</td>
                            <td class="player-name">${p.name}</td>
                            <td class="${p.mvp === maxMvp && maxMvp > 0 ? "stat-highlight" : ""}">${p.mvp}</td>
                            <td class="${p.k5 === maxK5 && maxK5 > 0 ? "stat-highlight" : ""}">${p.k5}</td>
                            <td class="${p.k4 === maxK4 && maxK4 > 0 ? "stat-highlight" : ""}">${p.k4}</td>
                            <td class="${p.kills === maxKills && maxKills > 0 ? "stat-highlight" : ""}">${p.kills}</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        `;

        renderWeeklyData(result.weeklyDetails);
    }

    function renderWeeklyData(weeklyDetails){
        const elWrap = document.getElementById("weeklyWrap");
        if (!weeklyDetails || !weeklyDetails.length) {
            elWrap.innerHTML = "";
            return;
        }

        elWrap.innerHTML = `
            <div class="weekly-wrap">
                <h2>📋 每周评选数据</h2>
                <div style="font-size:12px;color:var(--muted);margin-bottom:10px">评选规则：取每周所有对局数据，按选手平均 Rating 排名，最高者当选本周 MVP。</div>
                ${weeklyDetails.map(w => `
                    <div class="weekly-block">
                        <div class="weekly-head">
                            <span>第 ${w.weekNumber} 周 · ${w.dateRange}</span>
                            <span class="mvp-badge">👑 MVP: ${w.mvpName}</span>
                        </div>
                        <table class="weekly-table">
                            <thead>
                                <tr>
                                    <th>排名</th>
                                    <th>玩家</th>
                                    <th>场次</th>
                                    <th>Rating</th>
                                    <th>K/D/A</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${w.players.map((p, i) => `
                                    <tr class="${p.name === w.mvpName ? "mvp-row" : ""}">
                                        <td>${i + 1}</td>
                                        <td>${p.name === w.mvpName ? `<span class="weekly-mvp-name">${p.name}</span>` : p.name}</td>
                                        <td>${p.matches}</td>
                                        <td class="rating-cell">${p.avgRating.toFixed(2)}</td>
                                        <td>${p.avgK}/${p.avgD}/${p.avgA}</td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>
                `).join("")}
            </div>
        `;
    }

    async function init(){
        initTheme();

        document.getElementById("backBtn").addEventListener("click", ()=>{
            location.href = "index.html";
        });

        document.getElementById("tabs").addEventListener("click", e => {
            const tab = e.target.closest("[data-sort]");
            if (tab) setSort(tab.dataset.sort);
        });

        try {
            const response = await fetch(REPORT_JSON_URL, { cache: "no-store" });
            if (!response.ok) throw new Error("load failed");
            window._rawData = await response.json();
        } catch (e) {
            console.warn("加载战绩数据失败:", e);
            window._rawData = null;
        }
        renderTable();

        const elScrollBtn = document.getElementById("scrollTopBtn");
        let scrollTimer;
        window.addEventListener("scroll", ()=>{
            if (window.scrollY > 300) {
                elScrollBtn.classList.add("show");
                clearTimeout(scrollTimer);
                scrollTimer = setTimeout(() => elScrollBtn.classList.remove("show"), 3000);
            } else {
                elScrollBtn.classList.remove("show");
            }
        });
        elScrollBtn.addEventListener("click", ()=>{
            window.scrollTo({ top: 0, behavior: "smooth" });
        });
    }

    init();
</script>
</body>
</html>
