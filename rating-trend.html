<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSGO Rating 走势</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="assets/css/rating-trend.css" />
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1>Rating 走势</h1>
            <p class="sub">基于所有对局数据，按时间顺序展示每位玩家 Rating 折线走势。</p>
        </div>
        <button id="backBtn" class="btn" type="button">返回战绩列表</button>
    </div>

    <div id="chartCard" class="chart-card" hidden>
        <div class="chart-wrap">
            <canvas id="ratingChart" aria-label="rating 走势图"></canvas>
            <div id="chartTooltip" class="chart-tooltip" aria-hidden="true"></div>
        </div>
        <div id="legend" class="legend"></div>
        <div class="hint">横轴：按时间顺序的对局编号；纵轴：Rating。滚轮缩放横轴，点击图例可隐藏/显示玩家。</div>
    </div>
    <div id="empty" class="empty" hidden>暂无可绘制的战绩数据。</div>
</div>

<script src="assets/js/rating-trend.js"></script>
</body>
</html>
