<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSGO 战绩日报</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <style>
        :root{
            --bg:#0f1115; --card:#171b22; --text:#f5f7fa; --muted:#9aa4b2;
            --border:#2a303b; --accent2:#00d4ff; --input-bg:#12161d;
            --score-win-bg:rgba(59,207,149,.16); --score-lose-bg:rgba(255,107,122,.16); --score-draw-bg:rgba(154,164,178,.14);
        }
        :root[data-theme="light"]{
            --bg:#f3f6fb; --card:#ffffff; --text:#1b2430; --muted:#5f6f83;
            --border:#d5dfec; --accent2:#1e8dff; --input-bg:#f7f9fd;
            --score-win-bg:rgba(59,207,149,.2); --score-lose-bg:rgba(255,107,122,.2); --score-draw-bg:rgba(95,111,131,.12);
        }
        *{box-sizing:border-box}
        body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,Microsoft YaHei,sans-serif}
        .wrap{width:min(980px,92%);margin:0 auto;padding:24px 0 34px}
        .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
        h1{margin:0;font-size:30px}
        .sub{margin:8px 0 0;color:var(--muted);font-size:14px}
        .btn,.input{
            height:38px;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);
            color:var(--text);padding:0 12px
        }
        .btn{cursor:pointer}
        .btn:hover{border-color:var(--accent2)}
        .toolbar{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
        .table-wrap{margin-top:14px;border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:auto}
        .report-list{display:flex;flex-direction:column;gap:12px;padding:12px}
        .report-match{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card)}
        .report-match.located{
            outline:2px solid var(--accent2);
            box-shadow:0 0 0 4px rgba(0,212,255,.18), 0 10px 22px rgba(0,0,0,.2);
            animation:locatedPulse .75s ease 1;
        }
        .match-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
        .match-head.bg-win{background:var(--score-win-bg)}
        .match-head.bg-lose{background:var(--score-lose-bg)}
        .match-head.bg-draw{background:var(--score-draw-bg)}
        .match-summary{margin-top:14px;border:1px solid var(--border);border-radius:12px;background:var(--card);padding:12px}
        .match-score{font-size:20px;font-weight:800;letter-spacing:.3px}
        .match-score-sep{color:var(--muted);padding:0 4px}
        .score-win{color:#3bcf95}
        .score-lose{color:#ff6b7a}
        .score-draw{color:#98a3b3}
        .match-result{font-size:22px;font-weight:900;line-height:1;align-self:center}
        .match-result.win{color:#3bcf95}
        .match-result.lose{color:#ff6b7a}
        .match-summary{margin-top:0;border:none;border-radius:8px;padding:8px 10px;background:transparent}
        table{width:100%;border-collapse:collapse;font-size:14px}
        th,td{padding:12px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
        th{font-size:12px;color:var(--muted);letter-spacing:.3px}
        tr:last-child td{border-bottom:none}
        .rating-good{color:#78dfb4;font-weight:700}
        .rating-bad{color:#ff9aa7;font-weight:700}
        .empty{padding:16px 12px;color:var(--muted);font-size:13px}
        @keyframes locatedPulse{
            0%{transform:scale(1)}
            45%{transform:scale(1.012)}
            100%{transform:scale(1)}
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1>CSGO 战绩日报</h1>
            <p class="sub">展示某一天开黑对局详情：姓名、K/D/A、Rating。</p>
        </div>
    </div>

    <div class="toolbar">
        <input id="reportDate" class="input" type="date" aria-label="选择战绩日期" />
        <button id="backBtn" class="btn" type="button">返回高光页</button>
    </div>

    <div id="tableWrap" class="table-wrap"></div>
</div>

<script>
    const LS_THEME = "csgo-theme";
    const REPORT_JSON_URL = "assets/reports/daily-report.json";
    const FALLBACK_REPORTS = [
        {
            date: "2026-05-24",
            matches: [
                {
                    myRounds: 13,
                    enemyRounds: 10,
                    result: "胜利",
                    players: [
                        { name: "我", k: 23, d: 17, a: 8, rating: 1.34 },
                        { name: "阿明", k: 18, d: 19, a: 7, rating: 1.02 },
                        { name: "小白", k: 15, d: 16, a: 11, rating: 0.98 }
                    ]
                },
                {
                    myRounds: 11,
                    enemyRounds: 13,
                    result: "失败",
                    players: [
                        { name: "我", k: 25, d: 20, a: 7, rating: 1.11 },
                        { name: "阿明", k: 16, d: 19, a: 8, rating: 0.93 },
                        { name: "小白", k: 14, d: 18, a: 10, rating: 0.89 }
                    ]
                }
            ]
        },
        {
            date: "2026-05-25",
            matches: [
                {
                    myRounds: 8,
                    enemyRounds: 13,
                    result: "失败",
                    players: [
                        { name: "我", k: 27, d: 14, a: 6, rating: 1.48 },
                        { name: "阿明", k: 21, d: 18, a: 5, rating: 1.12 },
                        { name: "小白", k: 16, d: 20, a: 9, rating: 0.94 }
                    ]
                }
            ]
        },
        {
            date: "2026-05-26",
            matches: [
                {
                    myRounds: 13,
                    enemyRounds: 11,
                    result: "胜利",
                    players: [
                        { name: "我", k: 19, d: 13, a: 10, rating: 1.29 },
                        { name: "阿明", k: 17, d: 15, a: 8, rating: 1.08 },
                        { name: "小白", k: 14, d: 16, a: 12, rating: 1.01 }
                    ]
                },
                {
                    myRounds: 13,
                    enemyRounds: 6,
                    result: "胜利",
                    players: [
                        { name: "我", k: 22, d: 9, a: 6, rating: 1.52 },
                        { name: "阿明", k: 18, d: 11, a: 7, rating: 1.23 },
                        { name: "小白", k: 15, d: 12, a: 9, rating: 1.09 }
                    ]
                }
            ]
        }
    ];
    let reports = [];
    let reportByDate = new Map();

    const elDate = document.getElementById("reportDate");
    const elWrap = document.getElementById("tableWrap");
    const elBackBtn = document.getElementById("backBtn");

    function applyTheme(theme){
        const nextTheme = theme === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", nextTheme);
        localStorage.setItem(LS_THEME, nextTheme);
    }

    function initTheme(){
        const savedTheme = localStorage.getItem(LS_THEME);
        if (savedTheme === "light" || savedTheme === "dark") {
            applyTheme(savedTheme);
            return;
        }
        const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
        applyTheme(prefersLight ? "light" : "dark");
    }

    function normalizeReports(raw){
        const list = Array.isArray(raw) ? raw : (Array.isArray(raw && raw.reports) ? raw.reports : []);
        function normalizeMatch(match, legacyItem){
            const source = match || legacyItem || {};
            const players = Array.isArray(source.players) ? source.players : [];
            const myRounds = Number(source.myRounds);
            const enemyRounds = Number(source.enemyRounds);
            const normalizedMyRounds = Number.isFinite(myRounds) ? myRounds : 0;
            const normalizedEnemyRounds = Number.isFinite(enemyRounds) ? enemyRounds : 0;
            const inferredResult = normalizedMyRounds > normalizedEnemyRounds ? "胜利" : (normalizedMyRounds < normalizedEnemyRounds ? "失败" : "平局");
            return {
                myRounds: normalizedMyRounds,
                enemyRounds: normalizedEnemyRounds,
                result: String(source.result || inferredResult),
                players: players.map((p) => ({
                    name: String((p && p.name) || "未知玩家"),
                    k: Number(p && p.k) || 0,
                    d: Number(p && p.d) || 0,
                    a: Number(p && p.a) || 0,
                    rating: Number(p && p.rating) || 0
                }))
            };
        }

        return list
            .map((item) => {
                const rawMatches = Array.isArray(item && item.matches) ? item.matches : null;
                const normalizedMatches = (rawMatches && rawMatches.length)
                    ? rawMatches.map((match) => normalizeMatch(match, item))
                    : [normalizeMatch(item, item)];
                return {
                    date: String((item && item.date) || "").trim(),
                    matches: normalizedMatches
                };
            })
            .filter((item) => /^\d{4}-\d{2}-\d{2}$/.test(item.date));
    }

    async function loadReports(){
        try {
            const response = await fetch(REPORT_JSON_URL, { cache: "no-store" });
            if (!response.ok) throw new Error("report json load failed");
            const raw = await response.json();
            reports = normalizeReports(raw);
            if (!reports.length) throw new Error("report json empty");
        } catch (error) {
            console.warn("读取战绩 JSON 失败，使用内置示例数据:", error);
            reports = normalizeReports(FALLBACK_REPORTS);
        }
        reportByDate = new Map(reports.map((item) => [item.date, item]));
    }

    function renderReport(){
        const report = reportByDate.get(elDate.value);
        if (!report || !Array.isArray(report.matches) || !report.matches.length) {
            elWrap.innerHTML = `<div class="empty">该日期暂无战绩数据。</div>`;
            return;
        }

        elWrap.innerHTML = `
            <div class="report-list">
                ${report.matches.map((match, idx) => {
                    const resultClass = match.result === "胜利" ? "win" : (match.result === "失败" ? "lose" : "");
                    const myWin = match.myRounds > match.enemyRounds;
                    const enemyWin = match.enemyRounds > match.myRounds;
                    const isDraw = !myWin && !enemyWin;
                    const headClass = myWin ? "bg-win" : (enemyWin ? "bg-lose" : "bg-draw");
                    const myScoreClass = myWin ? "score-win" : (enemyWin ? "score-lose" : "score-draw");
                    const enemyScoreClass = enemyWin ? "score-win" : (myWin ? "score-lose" : "score-draw");
                    const myRoundsText = String(match.myRounds).padStart(2, "0");
                    const enemyRoundsText = String(match.enemyRounds).padStart(2, "0");
                    return `
                    <section class="report-match" data-match-index="${idx + 1}">
                        <div class="match-head ${headClass}">
                            <div class="match-summary">
                                <div class="match-score"><span class="${myScoreClass}">${myRoundsText}</span><span class="match-score-sep">:</span><span class="${enemyScoreClass}">${enemyRoundsText}</span></div>
                            </div>
                            <div class="match-result ${resultClass}">${match.result}</div>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>K/D/A</th>
                                    <th>Rating</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${match.players.map(p => `
                                    <tr>
                                        <td>${p.name}</td>
                                        <td>${p.k}/${p.d}/${p.a}</td>
                                        <td class="${Number(p.rating) >= 1 ? "rating-good" : "rating-bad"}">${Number(p.rating).toFixed(2)}</td>
                                    </tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </section>`;
                }).join("")}
            </div>
        `;

        const matchParam = Number(new URLSearchParams(location.search).get("m"));
        if (Number.isFinite(matchParam) && matchParam > 0) {
            const target = elWrap.querySelector(`.report-match[data-match-index="${matchParam}"]`);
            if (target) {
                target.scrollIntoView({ behavior: "smooth", block: "center" });
                target.classList.add("located");
                setTimeout(() => target.classList.remove("located"), 1800);
            }
        }
    }

    function initDate(){
        const dates = reports.map(item => item.date).sort();
        const today = new Date().toISOString().slice(0, 10);
        const queryDate = new URLSearchParams(location.search).get("date");
        if (queryDate && reportByDate.has(queryDate)) {
            elDate.value = queryDate;
        } else {
            elDate.value = reportByDate.has(today) ? today : (dates[dates.length - 1] || "");
        }
        elDate.addEventListener("change", renderReport);
        renderReport();
    }

    elBackBtn.addEventListener("click", ()=>{
        const matchParam = new URLSearchParams(location.search).get("m");
        const dateValue = elDate.value;
        const params = new URLSearchParams();
        if (dateValue) params.set("date", dateValue);
        if (matchParam) params.set("m", matchParam);
        location.href = `report-list.html?${params.toString()}`;
    });

    async function init(){
        initTheme();
        await loadReports();
        initDate();
    }

    init();
</script>
</body>
</html>
