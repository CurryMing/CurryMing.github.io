<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSGO 战绩日报</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="assets/css/daily-report.css" />
</head>
<body>
<div class="wrap">
    <div class="topbar">
        <div>
            <h1>CSGO 战绩日报</h1>
            <p class="sub">展示某一天开黑对局详情：姓名、K/D/A、Rating。</p>
        </div>
    </div>

    <div class="toolbar">
        <input id="reportDate" class="input" type="date" aria-label="选择战绩日期" />
        <button id="backBtn" class="btn" type="button">返回战绩列表</button>
    </div>

    <div id="tableWrap" class="table-wrap"></div>
</div>

<button id="scrollTopBtn" class="scroll-top" type="button" aria-label="回到顶部">↑</button>
<script src="assets/js/daily-report.js"></script>
</body>
</html>
