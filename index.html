<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSGO 高光集锦</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="assets/css/index.css" />
</head>
<body>
<div class="wrap">
    <div class="hero">
        <div class="hero-inner">
            <h1>CSGO 高光集锦</h1>
            <p>支持地图分类封面、点赞与收藏（本地保存），并可一键复制分享链接，快速定位每一条精彩镜头。</p>
        </div>
    </div>

    <div id="mvpCard" class="mvp-card mvp-empty">
        <div class="mvp-crown">👑</div>
        <div class="mvp-info">
            <div class="mvp-label">本周 MVP</div>
            <div class="mvp-name" id="mvpName"></div>
            <div class="mvp-stats" id="mvpStats"></div>
            <div class="mvp-week" id="mvpWeek"></div>
            <div class="mvp-hint">点击进行分享</div>
        </div>
    </div>

    <div id="mvpShareMask" class="mvp-share-mask">
        <div class="mvp-share-panel">
            <img id="mvpShareImg" alt="MVP 分享图" />
            <button id="mvpShareDownloadBtn" class="btn" type="button">下载图片</button>
        </div>
    </div>

    <div id="mvpShareCard">
        <div class="share-top">
            <div class="share-crown">👑</div>
            <div class="share-label">WEEKLY MVP</div>
            <div class="share-name" id="shareMvpName"></div>
        </div>
        <div class="share-body">
            <div class="share-stats">
                <div class="share-stat rating">
                    <div class="share-stat-val" id="shareMvpRating"></div>
                    <div class="share-stat-label">Rating</div>
                </div>
                <div class="share-stat kills">
                    <div class="share-stat-val" id="shareMvpKda"></div>
                    <div class="share-stat-label">K/D/A</div>
                </div>
                <div class="share-stat matches">
                    <div class="share-stat-val" id="shareMvpMatches"></div>
                    <div class="share-stat-label">场次</div>
                </div>
            </div>
            <div class="share-week" id="shareMvpWeek"></div>
        </div>
    </div>

    <div class="toolbar">
        <input id="search" class="input" placeholder="搜索标题 / 地图 / 标签" />
        <div class="sort-select" id="sortSelect">
            <button id="sortTrigger" class="select sort-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="sortLabel">按日期（新到旧）</span>
            </button>
            <div id="sortMenu" class="sort-menu" role="listbox" aria-label="排序方式">
                <button class="sort-option active" type="button" data-sort-value="new" role="option" aria-selected="true">按日期（新到旧）</button>
                <button class="sort-option" type="button" data-sort-value="old" role="option" aria-selected="false">按日期（旧到新）</button>
                <button class="sort-option" type="button" data-sort-value="hot" role="option" aria-selected="false">按热度（点赞）</button>
            </div>
        </div>
        <button id="favOnlyBtn" class="btn" aria-pressed="false">收藏夹</button>
        <button id="reportPageBtn" class="btn">战绩日报</button>
        <button id="leaderboardBtn" class="btn">排行榜</button>
        <button id="themeBtn" class="btn theme-icon-btn" aria-label="切换主题" title="切换主题">
            <span class="theme-icon" aria-hidden="true">🌙</span>
        </button>
    </div>

    <div id="app"></div>
    <div class="footer">
        <span id="footerVersion"></span>
        <button id="changelogBtn" class="btn footer-version-btn" type="button">版本记录</button>
    </div>
</div>

<div id="changelogMask" class="changelog-mask" aria-hidden="true">
    <div class="changelog-panel" role="dialog" aria-modal="true" aria-labelledby="changelogTitle">
        <div class="changelog-head">
            <h2 id="changelogTitle" class="changelog-title">版本更新记录</h2>
            <button id="changelogCloseBtn" class="btn changelog-close" type="button">关闭</button>
        </div>
        <div id="changelogList" class="changelog-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="assets/js/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
    document.getElementById("mvpCard").addEventListener("click", async function(){
        if (!this.classList.contains("mvp-empty") && typeof html2canvas !== "undefined") {
            const el = document.getElementById("mvpShareCard");
            const canvas = await html2canvas(el, { backgroundColor: null, scale: 2 });
            const dataUrl = canvas.toDataURL("image/png");
            document.getElementById("mvpShareImg").src = dataUrl;
            document.getElementById("mvpShareDownloadBtn").onclick = () => {
                const a = document.createElement("a");
                a.href = dataUrl;
                a.download = "csgo-mvp.png";
                a.click();
            };
            document.getElementById("mvpShareMask").classList.add("show");
        }
    });
    document.getElementById("mvpShareMask").addEventListener("click", function(e){
        if (e.target === this) this.classList.remove("show");
    });
</script>
</body>
</html>
