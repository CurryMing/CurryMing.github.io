<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSGO 高光集锦</title>
    <style>
        :root{
            --bg:#0f1115; --card:#171b22; --text:#f5f7fa; --muted:#9aa4b2;
            --border:#2a303b; --accent:#ff7a00; --accent2:#00d4ff;
            --input-bg:#12161d; --media-bg:#0a0d12; --chip-bg:#202734;
            --cover-overlay:linear-gradient(to right,rgba(0,0,0,.55),rgba(0,0,0,.2));
            --active-text:#d7f8ff; --highlight-shadow:rgba(0,212,255,.2);
        }
        :root[data-theme="light"]{
            --bg:#f3f6fb; --card:#ffffff; --text:#1b2430; --muted:#5f6f83;
            --border:#d5dfec; --accent:#ff7a00; --accent2:#1e8dff;
            --input-bg:#f7f9fd; --media-bg:#e9eef7; --chip-bg:#edf2fa;
            --cover-overlay:linear-gradient(to right,rgba(255,255,255,.20),rgba(255,255,255,.02));
            --active-text:#0e5fb2; --highlight-shadow:rgba(30,141,255,.22);
        }
        *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Segoe UI,Microsoft YaHei,sans-serif}
        .wrap{width:min(1200px,92%);margin:0 auto;padding:20px 0 40px}
        .hero{padding:18px;border:1px solid var(--border);border-radius:14px;background:var(--card)}
        .hero h1{margin:0 0 8px}.hero p{margin:0;color:var(--muted)}
        .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0}
        .input,.btn,.select{
            height:38px;border:1px solid var(--border);border-radius:10px;
            background:var(--input-bg);color:var(--text);padding:0 12px
        }
        .input{min-width:260px;flex:1}.btn{cursor:pointer}
        .btn:hover{border-color:var(--accent2)}
        .theme-icon-btn{width:38px;padding:0;display:flex;align-items:center;justify-content:center}
        .theme-icon{font-size:16px;line-height:1}
        .section{margin-top:18px}
        .section-cover{
            border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--card);margin-bottom:10px
        }
        .section-cover.clickable{cursor:pointer;user-select:none}
        .cover-bg{
            height:110px;background-size:cover;background-position:center;position:relative
        }
        .cover-bg::after{content:"";position:absolute;inset:0;background:var(--cover-overlay)}
        .cover-title{
            position:absolute;left:14px;bottom:10px;z-index:1;font-size:clamp(28px,4.2vw,38px);font-weight:800;
            color:#fff;letter-spacing:.5px;text-shadow:0 2px 8px rgba(0,0,0,.45), 0 0 1px rgba(0,0,0,.35);
            -webkit-text-stroke:.6px rgba(0,0,0,.35)
        }
        .cover-sub{padding:10px 14px;color:var(--muted);font-size:13px}
        .grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;
            overflow:hidden;max-height:5000px;opacity:1;
            transition:max-height .42s cubic-bezier(.25,.8,.25,1), opacity .3s ease;
        }
        .grid.collapsed{max-height:0;opacity:0;pointer-events:none}
        .card{border:1px solid var(--border);border-radius:12px;background:var(--card);overflow:hidden}
        .grid .card{opacity:1;transform:translateY(0) scale(1);transition:opacity .28s ease, transform .36s cubic-bezier(.2,.75,.2,1)}
        .grid:not(.collapsed) .card{transition-delay:calc(var(--i, 0) * 28ms)}
        .grid.collapsed .card{opacity:0;transform:translateY(10px) scale(.985);transition-delay:0ms}
        .media{aspect-ratio:16/9;background:var(--media-bg)}
        video,iframe{width:100%;height:100%;border:0;display:block;object-fit:cover}
        .content{padding:10px 12px 12px}
        .title{margin:0 0 8px;font-size:16px}
        .meta{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-bottom:8px}
        .ops{display:flex;gap:8px;flex-wrap:wrap}
        .op-btn{
            border:1px solid var(--border);border-radius:999px;background:var(--chip-bg);color:var(--text);
            padding:4px 10px;font-size:12px;cursor:pointer
        }
        .op-btn.active{border-color:var(--accent2);color:var(--active-text)}
        .pill{display:inline-block;padding:2px 8px;border:1px solid var(--border);border-radius:999px;font-size:12px;margin-right:6px}
        .highlight{outline:2px solid var(--accent2);box-shadow:0 0 0 4px var(--highlight-shadow)}
        .footer{color:var(--muted);font-size:12px;text-align:center;margin-top:20px}
        .action-toast{
            position:fixed;right:16px;top:14px;z-index:9999;padding:10px 14px;border-radius:12px;
            color:#fff;font-size:13px;font-weight:600;letter-spacing:.2px;opacity:0;transform:translateY(-12px) scale(.98);
            box-shadow:0 12px 28px rgba(0,0,0,.28);pointer-events:none;transition:opacity .2s ease, transform .26s ease;
        }
        .action-toast.show{opacity:1;transform:translateY(0) scale(1)}
        .action-toast.like{background:linear-gradient(120deg,#ff5a7f,#ff7a00)}
        .action-toast.fav{background:linear-gradient(120deg,#4a5cff,#9a66ff)}
        .fx-burst{
            position:fixed;z-index:9998;pointer-events:none;font-size:24px;font-weight:700;line-height:1;
            transform:translate(-50%,-50%);
        }
        .fx-burst.like{animation:likeBurst .72s cubic-bezier(.2,.75,.2,1) forwards}
        .fx-burst.fav{animation:favBurst .78s cubic-bezier(.2,.75,.2,1) forwards}
        .op-btn.like-pop{animation:btnPunch .24s ease}
        .op-btn.fav-pop{animation:btnWobble .38s cubic-bezier(.2,.75,.2,1)}
        .fx-spark{
            position:fixed;z-index:9997;pointer-events:none;width:8px;height:8px;border-radius:50%;
            transform:translate(-50%,-50%);opacity:0;
        }
        .fx-spark.fav{background:radial-gradient(circle,#fff 0%,#d8c9ff 45%,#8f72ff 100%);box-shadow:0 0 12px rgba(148,108,255,.55)}
        .fx-spark.like{background:radial-gradient(circle,#fff 0%,#ffc0ca 45%,#ff6b88 100%);box-shadow:0 0 12px rgba(255,108,136,.48)}
        .fx-spark.go{animation:sparkTrail .72s cubic-bezier(.2,.72,.2,1) forwards}
        .combo-float{
            position:fixed;z-index:10000;pointer-events:none;padding:6px 10px;border-radius:10px;
            color:#fff;font-size:12px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
            box-shadow:0 10px 20px rgba(0,0,0,.25);transform:translate(-50%,-50%) scale(.8);opacity:0;
        }
        .combo-float.like{background:linear-gradient(120deg,#ff4d73,#ff9b2f)}
        .combo-float.fav{background:linear-gradient(120deg,#4f5dff,#a66dff)}
        .combo-float.go{animation:comboPop .9s cubic-bezier(.2,.78,.2,1) forwards}
        @keyframes likeBurst{
            0%{opacity:0;transform:translate(-50%,-50%) scale(.6)}
            18%{opacity:1;transform:translate(-50%,-62%) scale(1.2)}
            100%{opacity:0;transform:translate(-50%,-165%) scale(.9)}
        }
        @keyframes favBurst{
            0%{opacity:0;transform:translate(-50%,-50%) rotate(-16deg) scale(.55)}
            20%{opacity:1;transform:translate(-50%,-64%) rotate(10deg) scale(1.25)}
            100%{opacity:0;transform:translate(-50%,-155%) rotate(32deg) scale(.88)}
        }
        @keyframes btnPunch{50%{transform:scale(1.08)}100%{transform:scale(1)}}
        @keyframes btnWobble{20%{transform:rotate(-7deg) scale(1.05)}45%{transform:rotate(7deg) scale(1.08)}70%{transform:rotate(-3deg)}100%{transform:rotate(0) scale(1)}}
        @keyframes sparkTrail{
            0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
            20%{opacity:1}
            100%{opacity:0;transform:translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, -70px))) scale(1.05)}
        }
        @keyframes comboPop{
            0%{opacity:0;transform:translate(-50%,-50%) scale(.75)}
            20%{opacity:1;transform:translate(-50%,-66%) scale(1.08)}
            100%{opacity:0;transform:translate(-50%,-145%) scale(.96)}
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="hero">
        <h1>CSGO 高光集锦</h1>
        <p>支持地图分类封面、点赞/收藏（本地保存）、一键复制分享链接。</p>
    </div>

    <div class="toolbar">
        <input id="search" class="input" placeholder="搜索标题 / 地图 / 标签" />
        <select id="sort" class="select">
            <option value="new">按日期（新到旧）</option>
            <option value="hot">按热度（点赞）</option>
        </select>
        <button id="favOnlyBtn" class="btn">只看收藏</button>
        <button id="themeBtn" class="btn theme-icon-btn" aria-label="切换主题" title="切换主题">
            <span class="theme-icon" aria-hidden="true">🌙</span>
        </button>
    </div>

    <div id="app"></div>
    <div class="footer"></div>
</div>

<script>
    const DEFAULT_VIDEOS = [];

    let videos = [...DEFAULT_VIDEOS];
    const MANIFEST_URL = "assets/videos/manifest.json";

    const LS_LIKED = "csgo-liked";
    const LS_FAVS = "csgo-favs";
    const LS_THEME = "csgo-theme";
    const COMBO_WINDOW_MS = 1400;
    const liked = new Set(JSON.parse(localStorage.getItem(LS_LIKED) || "[]"));
    const favs = new Set(JSON.parse(localStorage.getItem(LS_FAVS) || "[]"));
    const collapsedMaps = new Set();
    const comboState = {
        like: { count: 0, lastAt: 0, timer: null },
        fav: { count: 0, lastAt: 0, timer: null }
    };
    let favOnly = false;

    const elApp = document.getElementById("app");
    const elSearch = document.getElementById("search");
    const elSort = document.getElementById("sort");
    const elFavOnlyBtn = document.getElementById("favOnlyBtn");
    const elThemeBtn = document.getElementById("themeBtn");

    function applyTheme(theme){
        const nextTheme = theme === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", nextTheme);
        if (elThemeBtn) {
            const iconEl = elThemeBtn.querySelector(".theme-icon");
            const toLight = nextTheme === "dark";
            if (iconEl) iconEl.textContent = toLight ? "☀️" : "🌙";
            elThemeBtn.setAttribute("aria-label", toLight ? "切换为白天模式" : "切换为黑夜模式");
            elThemeBtn.title = toLight ? "切换为白天模式" : "切换为黑夜模式";
        }
    }

    function initTheme(){
        const savedTheme = localStorage.getItem(LS_THEME);
        if (savedTheme === "light" || savedTheme === "dark") {
            applyTheme(savedTheme);
            return;
        }

        const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
        applyTheme(prefersLight ? "light" : "dark");
    }

    function save() {
        localStorage.setItem(LS_LIKED, JSON.stringify([...liked]));
        localStorage.setItem(LS_FAVS, JSON.stringify([...favs]));
    }

    function getLikeCount(v){ return v.baseLikes + (liked.has(v.id) ? 1 : 0); }

    function ytThumb(url){
        const m = url.match(/(?:embed\/|v=|youtu\.be\/)([a-zA-Z0-9_-]{6,})/);
        return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : "";
    }

    const MAP_COVER_BY_MAP = {
        // 按地图名指定顶部封面（可按需修改路径）
        mirage: "assets/map-covers/mirage.jpg",
        dust2: "assets/map-covers/dust2.png",
        inferno: "assets/map-covers/inferno.jpg",
        nuke: "assets/map-covers/nuke.jpg",
        ancient: "assets/map-covers/ancient.jpg",
        anubis: "assets/map-covers/anubis.jpg",
        overpass: "assets/map-covers/overpass.jpg",
        vertigo: "assets/map-covers/vertigo.jpg"
    };

    const MAP_NAME_CN_BY_KEY = {
        mirage: "荒漠迷城",
        dust2: "炙热沙城",
        inferno: "炼狱小镇",
        nuke: "核子危机",
        ancient: "远古遗迹",
        anubis: "阿努比斯",
        overpass: "死亡游乐园",
        vertigo: "殒命大厦"
    };

    function normalizeMapKey(map){
        return (map || "")
            .toLowerCase()
            .replace(/^de_/, "")
            .replace(/\s+/g, "")
            .replace(/[^a-z0-9]/g, "");
    }

    function mapNameForDisplay(map){
        const key = normalizeMapKey(map);
        return MAP_NAME_CN_BY_KEY[key] || map;
    }

    function coverForMap(map, items){
        const mappedCover = MAP_COVER_BY_MAP[normalizeMapKey(map)];
        if (mappedCover) return mappedCover;

        const first = items[0];
        if (!first) return "";
        if (first.poster) return first.poster;
        if (first.type === "youtube") return ytThumb(first.src);
        return "";
    }

    function groupByMap(arr){
        const m = new Map();
        arr.forEach(v => { if(!m.has(v.map)) m.set(v.map, []); m.get(v.map).push(v); });
        return [...m.entries()];
    }

    function isAbsoluteUrl(path){
        return /^https?:\/\//i.test(path || "");
    }

    function normalizeLocalPath(path, baseFolder){
        const p = (path || "").trim();
        if (!p) return "";
        if (isAbsoluteUrl(p) || p.startsWith("assets/") || p.startsWith("./") || p.startsWith("../")) return p;
        return `${baseFolder}/${p}`;
    }

    function guessTypeBySrc(src){
        const value = (src || "").toLowerCase();
        if (value.includes("youtube.com") || value.includes("youtu.be")) return "youtube";
        return "local";
    }

    function normalizeVideoItem(item, index){
        const src = normalizeLocalPath(item.src, "assets/videos");
        const type = item.type || guessTypeBySrc(src);
        const safeId = item.id || `video-${index + 1}`;
        return {
            id: safeId,
            title: item.title || `未命名视频 ${index + 1}`,
            map: item.map || "Unknown",
            date: item.date || "1970-01-01",
            tags: Array.isArray(item.tags) ? item.tags : [],
            type,
            src,
            poster: normalizeLocalPath(item.poster, "assets/posters"),
            baseLikes: Number(item.baseLikes) || 0
        };
    }

    async function loadVideosFromManifest(){
        try {
            const response = await fetch(MANIFEST_URL, { cache: "no-store" });
            if (!response.ok) throw new Error(`manifest http ${response.status}`);

            const raw = await response.json();
            const list = Array.isArray(raw) ? raw : (Array.isArray(raw.videos) ? raw.videos : []);
            if (!list.length) throw new Error("manifest videos empty");

            videos = list.map(normalizeVideoItem).filter(v => !!v.src);
            if (!videos.length) {
                throw new Error("manifest videos invalid");
            }
        } catch (error) {
            console.warn("加载 manifest 失败，当前没有默认视频数据:", error);
            videos = [...DEFAULT_VIDEOS];
        }
    }

    function filteredData(){
        const q = elSearch.value.trim().toLowerCase();
        let arr = videos.filter(v => {
            if (favOnly && !favs.has(v.id)) return false;
            if (!q) return true;
            const text = [v.title, v.map, ...(v.tags||[])].join(" ").toLowerCase();
            return text.includes(q);
        });

        if (elSort.value === "hot") arr.sort((a,b)=>getLikeCount(b)-getLikeCount(a));
        else arr.sort((a,b)=>(b.date||"").localeCompare(a.date||""));

        return arr;
    }

    function cardHtml(v, idx){
        const media = v.type === "youtube"
            ? `<iframe loading="lazy" src="${v.src}" title="${v.title}" allowfullscreen></iframe>`
            : `<video controls preload="metadata" poster="${v.poster||""}"><source src="${v.src}" type="video/mp4" /></video>`;

        return `
      <article class="card" id="card-${v.id}" style="--i:${idx};">
        <div class="media">${media}</div>
        <div class="content">
          <h3 class="title">${v.title}</h3>
          <div class="meta"><span>${v.date}</span><span>${v.map}</span></div>
          <div style="margin-bottom:8px">${(v.tags||[]).map(t=>`<span class="pill">${t}</span>`).join("")}</div>
          <div class="ops">
            <button class="op-btn ${liked.has(v.id) ? "active":""}" data-action="like" data-id="${v.id}">👍 点赞 ${getLikeCount(v)}</button>
            <button class="op-btn ${favs.has(v.id) ? "active":""}" data-action="fav" data-id="${v.id}">${favs.has(v.id) ? "★ 已收藏" : "☆ 收藏"}</button>
            <button class="op-btn" data-action="share" data-id="${v.id}">🔗 分享</button>
          </div>
        </div>
      </article>`;
    }

    function render(){
        const arr = filteredData();
        const groups = groupByMap(arr);

        if (!arr.length){
            elApp.innerHTML = `<div class="section-cover"><div class="cover-sub">没有匹配结果，换个关键词试试。</div></div>`;
            return;
        }

        elApp.innerHTML = groups.map(([map, items])=>{
            const mapKey = normalizeMapKey(map) || map;
            const collapsed = collapsedMaps.has(mapKey);
            const cover = coverForMap(map, items);
            const displayName = mapNameForDisplay(map);
            return `
          <section class="section">
            <div class="section-cover clickable" data-action="toggle-map" data-map-key="${mapKey}">
              <div class="cover-bg" style="background-image:url('${cover || ""}')">
                <div class="cover-title">${displayName}</div>
              </div>
              <div class="cover-sub" data-count="${items.length}">共 ${items.length} 条高光 · ${collapsed ? "点击展开" : "点击折叠"}</div>
            </div>
            <div class="grid ${collapsed ? "collapsed" : ""}">${items.map((v, idx)=>cardHtml(v, idx)).join("")}</div>
          </section>`;
        }).join("");
    }

    async function shareVideo(id){
        const url = `${location.origin}${location.pathname}?v=${encodeURIComponent(id)}`;
        try {
            await navigator.clipboard.writeText(url);
            alert("已复制分享链接：\n" + url);
        } catch {
            prompt("复制以下链接分享：", url);
        }
    }

    function showActionFeedback(action, isAdd, anchorEl){
        const rect = anchorEl ? anchorEl.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0 };
        const x = rect.left + (rect.width / 2);
        const y = rect.top + 10;

        const burst = document.createElement("div");
        burst.className = `fx-burst ${action}`;
        burst.textContent = action === "like" ? (isAdd ? "❤" : "♡") : (isAdd ? "★" : "☆");
        burst.style.left = `${x}px`;
        burst.style.top = `${y}px`;
        document.body.appendChild(burst);
        setTimeout(()=>burst.remove(), 900);

        const sparkOffsets = action === "fav"
            ? [[-28,-18],[-10,-36],[14,-32],[30,-14]]
            : [[-20,-12],[0,-30],[20,-12]];
        sparkOffsets.forEach(([dx, dy])=>{
            const spark = document.createElement("div");
            spark.className = `fx-spark ${action}`;
            spark.style.left = `${x}px`;
            spark.style.top = `${y}px`;
            spark.style.setProperty("--dx", `${dx}px`);
            spark.style.setProperty("--dy", `${dy}px`);
            document.body.appendChild(spark);
            requestAnimationFrame(()=>spark.classList.add("go"));
            setTimeout(()=>spark.remove(), 780);
        });

        const toast = document.createElement("div");
        toast.className = `action-toast ${action}`;
        toast.textContent = action === "like"
            ? (isAdd ? "已点赞，热度 +1" : "已取消点赞")
            : (isAdd ? "已加入收藏夹" : "已取消收藏");
        document.body.appendChild(toast);
        requestAnimationFrame(()=>toast.classList.add("show"));
        setTimeout(()=>{
            toast.classList.remove("show");
            setTimeout(()=>toast.remove(), 260);
        }, 950);
    }

    function animateActionButton(btn, action){
        const cls = action === "like" ? "like-pop" : "fav-pop";
        btn.classList.remove(cls);
        void btn.offsetWidth;
        btn.classList.add(cls);
    }

    function showComboFeedback(action, count, anchorEl){
        const rect = anchorEl ? anchorEl.getBoundingClientRect() : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0 };
        const x = rect.left + (rect.width / 2);
        const y = rect.top - 4;

        const combo = document.createElement("div");
        combo.className = `combo-float ${action}`;
        combo.textContent = `${action.toUpperCase()} COMBO x${count}`;
        combo.style.left = `${x}px`;
        combo.style.top = `${y}px`;
        document.body.appendChild(combo);
        requestAnimationFrame(()=>combo.classList.add("go"));
        setTimeout(()=>combo.remove(), 920);
    }

    function updateCombo(action, isAdd, anchorEl){
        const state = comboState[action];
        if (!state) return;

        if (!isAdd) {
            state.count = 0;
            state.lastAt = 0;
            if (state.timer) clearTimeout(state.timer);
            state.timer = null;
            return;
        }

        const now = Date.now();
        state.count = (now - state.lastAt <= COMBO_WINDOW_MS) ? state.count + 1 : 1;
        state.lastAt = now;

        if (state.count >= 2) showComboFeedback(action, state.count, anchorEl);

        if (state.timer) clearTimeout(state.timer);
        state.timer = setTimeout(()=>{
            state.count = 0;
            state.lastAt = 0;
            state.timer = null;
        }, COMBO_WINDOW_MS);
    }

    function bindEvents(){
        elSearch.addEventListener("input", render);
        elSort.addEventListener("change", render);
        elFavOnlyBtn.addEventListener("click", ()=>{
            favOnly = !favOnly;
            elFavOnlyBtn.textContent = favOnly ? "显示全部" : "只看收藏";
            render();
        });

        elThemeBtn.addEventListener("click", ()=>{
            const current = document.documentElement.getAttribute("data-theme") || "dark";
            const next = current === "dark" ? "light" : "dark";
            applyTheme(next);
            localStorage.setItem(LS_THEME, next);
        });

        document.addEventListener("click", (e)=>{
            const btn = e.target.closest("[data-action]");
            if (!btn) return;
            const { action, id, mapKey } = btn.dataset;
            if (action === "toggle-map"){
                const sectionEl = btn.closest(".section");
                const gridEl = sectionEl ? sectionEl.querySelector(".grid") : null;
                const subEl = sectionEl ? sectionEl.querySelector(".cover-sub") : null;
                if (!gridEl) return;

                const nextCollapsed = !gridEl.classList.contains("collapsed");
                gridEl.classList.toggle("collapsed", nextCollapsed);

                if (nextCollapsed) collapsedMaps.add(mapKey);
                else collapsedMaps.delete(mapKey);

                if (subEl) {
                    const count = subEl.dataset.count || "0";
                    subEl.textContent = `共 ${count} 条高光 · ${nextCollapsed ? "点击展开" : "点击折叠"}`;
                }
            } else if (action === "like"){
                const isAdd = !liked.has(id);
                liked.has(id) ? liked.delete(id) : liked.add(id);
                showActionFeedback("like", isAdd, btn);
                animateActionButton(btn, "like");
                updateCombo("like", isAdd, btn);
                save();
                setTimeout(render, 180);
            } else if (action === "fav"){
                const isAdd = !favs.has(id);
                favs.has(id) ? favs.delete(id) : favs.add(id);
                showActionFeedback("fav", isAdd, btn);
                animateActionButton(btn, "fav");
                updateCombo("fav", isAdd, btn);
                save();
                setTimeout(render, 180);
            } else if (action === "share"){
                shareVideo(id);
            }
        });
    }

    function locateFromQuery(){
        const id = new URLSearchParams(location.search).get("v");
        if (!id) return;
        const target = document.getElementById(`card-${id}`);
        if (target){
            target.scrollIntoView({behavior:"smooth", block:"center"});
            target.classList.add("highlight");
            setTimeout(()=>target.classList.remove("highlight"), 2200);
        }
    }

    async function init(){
        initTheme();
        bindEvents();
        await loadVideosFromManifest();
        render();
        setTimeout(locateFromQuery, 100);
    }

    init();
</script>
</body>
</html>
